<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("music");
music.volume = 0;

// Must be triggered by user interaction
function playMusic() {
    music.play().then(() => {
        let v = 0;
        let fade = setInterval(() => {
            if (v < 1) {
                v += 0.02;
                music.volume = v;
            } else {
                clearInterval(fade);
            }
        }, 100);
    }).catch(() => {});
}
</script>
